version: 2

sources:
  - name: raw_data
    description: Raw data from source systems
    database: RAW_DB
    schema: PUBLIC
    tables:
      - name: raw_orders
        description: Raw orders data from the source system
        columns:
          - name: order_id
            description: Unique order identifier
            tests:
              - unique
              - not_null
          - name: customer_id
            description: Customer identifier
            tests:
              - not_null
          - name: order_date
            description: Date of the order
          - name: amount
            description: Order amount
            tests:
              - not_null
          - name: status
            description: Order status

      - name: raw_customers
        description: Raw customers data
        columns:
          - name: customer_id
            description: Unique customer identifier
            tests:
              - unique
              - not_null

models:
  - name: stg_orders
    description: Staging layer for orders
    columns:
      - name: order_id
        description: Unique order identifier
        tests:
          - unique
          - not_null

  - name: fct_orders
    description: Fact table for orders
    columns:
      - name: order_id
        description: Unique order identifier
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id

  - name: dim_customers
    description: Dimension table for customers
    columns:
      - name: customer_id
        description: Unique customer identifier
        tests:
          - unique
          - not_null

  - name: agg_order_metrics
    description: Aggregated order metrics by customer
    columns:
      - name: customer_id
        description: Customer identifier
        tests:
          - not_null
