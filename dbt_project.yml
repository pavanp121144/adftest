# Name your project! Project names should be lowercase and use underscores as spaces.
name: 'snowflake_analytics'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'snowflake_profile'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
data-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Configuring models
models:
  snowflake_analytics:
    materialization: table
    staging:
      materialized: view
      tags: ["staging"]
    marts:
      materialized: table
      tags: ["mart"]
    intermediate:
      materialized: ephemeral
      tags: ["intermediate"]

# Seed configurations
seeds:
  snowflake_analytics:
    +schema: raw

# Variable configurations
vars:
  # Date format for dbt
  date_format: "%Y-%m-%d"
  # Environment variable
  environment: "dev"

# On-run-start and on-run-end hooks
on-run-start:
  - "{{ log('dbt run started', info=true) }}"

on-run-end:
  - "{{ log('dbt run completed', info=true) }}"
